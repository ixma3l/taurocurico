server {
    listen 8080;
    server_name _;

    absolute_redirect off;
    port_in_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    location ~* ^/uploads/(?:.*\/)?\.[^/]+ {
        return 404;
    }

    location ~* ^/uploads/.*\.(?:env|ini|conf|config|ya?ml|json|toml|lock|sql|sqlite|db|bak|backup|old|orig|swp|tmp|log|pem|key|crt|cer|p12|pfx|zip|tar|tgz|gz|7z|rar|php|sh|bash|zsh|py|rb|pl|js|mjs|ts|tsx|html?)$ {
        return 404;
    }

    location ~* ^/uploads/.*\.(?:jpe?g|png|webp|avif|gif)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /uploads/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* ^/(?!uploads/).+\.(?:css|js|mjs|json|svg|ico|png|jpg|jpeg|gif|webp|avif|woff2?)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}
